# Windows debug — reproduce the apply-loop CLINotFoundError on a real windows-latest runner.
# workflow_dispatch ONLY; never publishes; no interactive SSH. Tests the two live hypotheses:
#   (A) Windows Defender quarantines the runtime-extracted claude.exe (file-absent / WinError 2)
#   (B) a transient race makes the pinned absolute claude.exe momentarily absent at spawn
name: Windows Debug (CLINotFoundError)
on:
  workflow_dispatch: {}

jobs:
  windows-diag:
    name: windows-diag
    runs-on: windows-latest
    steps:
      - name: Checkout private source (manual; protectNTFS off)
        env:
          SRC_PAT: ${{ secrets.SRC_PAT }}
        run: |
          git -c core.protectNTFS=false clone --no-checkout --depth 1 --filter=blob:none \
            "https://x-access-token:${SRC_PAT}@github.com/jonathanmejia4/SAF_FileSystem.git" src
          cd src
          git sparse-checkout init --cone
          git sparse-checkout set enterjobs-runtime enterjobs-desktop job-search
          git -c core.protectNTFS=false checkout main
        shell: bash
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Fetch the bundled Claude CLI
        working-directory: src/enterjobs-runtime
        shell: pwsh
        run: pwsh -File ./fetch-claude-cli.ps1 -Channel stable

      - name: Diagnose (Defender state + extraction + quarantine + spawn race)
        shell: pwsh
        working-directory: src
        run: |
          $ErrorActionPreference = "Continue"
          Write-Host "=================== DEFENDER STATE (AV hypothesis) ==================="
          try { Get-MpComputerStatus | Select-Object RealTimeProtectionEnabled,AntivirusEnabled,IsTamperProtected,AMRunningMode | Format-List } catch { Write-Host "Get-MpComputerStatus failed: $_" }
          try { Get-MpPreference | Select-Object DisableRealtimeMonitoring,ExclusionPath | Format-List } catch {}

          Write-Host "=================== LOCATE fetched claude artifact ==================="
          $found = Get-ChildItem -Path . -Recurse -Filter "claude.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $found) { $found = Get-ChildItem -Path . -Recurse -Filter "claude.zip" -ErrorAction SilentlyContinue | Select-Object -First 1 }
          Write-Host "source artifact: $($found.FullName)"

          Write-Host "=================== EXTRACT to %APPDATA%\enterjobs-desktop\claude (like the app) ==================="
          $roam = Join-Path $env:APPDATA "enterjobs-desktop\claude"
          New-Item -ItemType Directory -Force -Path $roam | Out-Null
          $cli = Join-Path $roam "claude.exe"
          if ($found.Extension -eq ".zip") { Expand-Archive -Path $found.FullName -DestinationPath $roam -Force } else { Copy-Item $found.FullName $cli -Force }
          Write-Host "present immediately after extract: $(Test-Path $cli)  size: $((Get-Item $cli -ErrorAction SilentlyContinue).Length)"

          Write-Host "=================== WAIT 10s, re-check (Defender quarantine?) ==================="
          Start-Sleep -Seconds 10
          Write-Host "STILL present after 10s: $(Test-Path $cli)"
          try { Get-MpThreatDetection | Format-List } catch {}
          try { Get-MpThreat | Format-List } catch {}

          Write-Host "=================== SPAWN RACE: 30 rapid spawns of the pinned path ==================="
          $fail = 0
          for ($i=0; $i -lt 30; $i++) {
            try {
              $p = Start-Process -FilePath $cli -ArgumentList "--version" -NoNewWindow -PassThru -Wait -ErrorAction Stop
              if ($p.ExitCode -ne 0) { Write-Host "spawn $i nonzero exit $($p.ExitCode)" }
            } catch { $fail++; Write-Host "spawn $i FAILED (file-absent/exec error): $_" }
          }
          Write-Host "RACE RESULT: $fail / 30 spawns failed.  present at end: $(Test-Path $cli)"
          Write-Host "=================== DONE ==================="
