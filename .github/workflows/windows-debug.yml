# Windows Verify — automated proof of v0.1.26 install-time extraction on a REAL windows-latest runner.
# Downloads the PUBLISHED installer, silent-installs it, and asserts claude.exe is present at the install
# dir BEFORE any app launch (= install-time extraction worked → no runtime unzip on the click path → no
# UI-thread freeze, no CLINotFoundError race). workflow_dispatch only; no SSH; never publishes.
name: Windows Verify (install-time extraction)
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag to verify (e.g. v0.1.26)"
        default: "v0.1.26"

jobs:
  verify:
    name: windows-verify
    runs-on: windows-latest
    steps:
      - name: Download the published installer
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ inputs.version }}" -R jonathanmejia4/enterjobs-desktop -p "EnterJobs-Setup.exe" -D .
          if (-not (Test-Path ".\EnterJobs-Setup.exe")) { Write-Host "FAIL: installer not downloaded"; exit 1 }
          "downloaded: $((Get-Item .\EnterJobs-Setup.exe).Length) bytes"

      - name: Silent install (NSIS /S)
        shell: pwsh
        run: |
          $p = Start-Process -FilePath ".\EnterJobs-Setup.exe" -ArgumentList "/S" -PassThru -Wait
          "installer exit code: $($p.ExitCode)"
          Start-Sleep -Seconds 12

      - name: Verify install-time extraction (NO app launch)
        shell: pwsh
        run: |
          $exe = Get-ChildItem "$env:LOCALAPPDATA\Programs" -Recurse -Filter "EnterJobs.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $exe) { Write-Host "FAIL: EnterJobs.exe not found after install"; exit 1 }
          $instDir = $exe.DirectoryName
          "install dir: $instDir"
          $cli = Join-Path $instDir "claude\claude.exe"
          $present = Test-Path $cli
          "claude.exe present at install dir (before any launch): $present"
          if (-not $present) { Write-Host "FAIL: claude.exe was NOT extracted at install time (the fix did not work)"; exit 1 }
          $size = (Get-Item $cli).Length
          "claude.exe size: $size"
          if ($size -lt 100000000) { Write-Host "FAIL: claude.exe too small ($size) — extraction incomplete"; exit 1 }
          # marker present?
          "marker present: $(Test-Path (Join-Path $instDir 'claude\claude.exe.extracted.ok'))"
          # confirm the extracted binary actually runs
          & $cli --version
          if ($LASTEXITCODE -ne 0) { Write-Host "FAIL: extracted claude.exe did not run"; exit 1 }
          Write-Host "PASS: install-time extraction VERIFIED — claude.exe present + runnable at the install dir before any app launch."
