# EnterJobs desktop — build on the PUBLIC repo's FREE runners. Source lives in the private
# SAF_FileSystem repo (cloned via the SRC_PAT read token); installers publish to THIS repo's
# releases via the built-in GITHUB_TOKEN (same-repo → no extra publish token, no billing quota).
name: Build EnterJobs
on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to this repo's Releases"
        type: boolean
        default: true
  push:
    tags: ["v*"]
permissions:
  contents: write
defaults:
  run:
    shell: bash
jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    steps:
      # Manual clone (not actions/checkout) so we can disable core.protectNTFS — the repo
      # contains a Windows-illegal path (trailing space in Enter_Robotics_Website/...) that
      # aborts a normal Windows checkout even under sparse-checkout (Git validates every tree
      # path before sparse skips it). protectNTFS=false stops that abort; cone sparse-checkout
      # to the 3 build dirs keeps the bad dir out of the working tree (NTFS can't create it).
      - name: Checkout private source (manual; protectNTFS off)
        env:
          SRC_PAT: ${{ secrets.SRC_PAT }}
        run: |
          git -c core.protectNTFS=false clone --no-checkout --depth 1 --filter=blob:none \
            "https://x-access-token:${SRC_PAT}@github.com/jonathanmejia4/SAF_FileSystem.git" src
          cd src
          git sparse-checkout init --cone
          git sparse-checkout set enterjobs-runtime enterjobs-desktop job-search
          git -c core.protectNTFS=false checkout main
          git remote set-url origin https://github.com/jonathanmejia4/SAF_FileSystem.git
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - name: Freeze the runtime sidecar (PyInstaller)
        working-directory: src/enterjobs-runtime
        run: |
          python -m pip install --upgrade pip pyinstaller
          pip install claude-agent-sdk anyio fastmcp patchright browserforge httpx pyyaml
          pip install -r requirements-osint.txt || echo "osint deps partial — non-fatal"
          pyinstaller --noconfirm enterjobs-runtime.spec
          BIN="dist/enterjobs-runtime/enterjobs-runtime"
          [ "${{ matrix.os }}" = "windows-latest" ] && BIN="dist/enterjobs-runtime/enterjobs-runtime.exe"
          # Smoke: the frozen binary must dispatch AND emit valid JSON (catches a binary that
          # launches but has a broken/garbled import tree — pipefail already fails on non-zero exit).
          "$BIN" auth status | tee _smoke_auth.json
          python -c "import json; json.load(open('_smoke_auth.json')); print('OK: auth status emits valid JSON')"
          "$BIN" stats | tee _smoke_stats.json || true
          python -c "import json; json.load(open('_smoke_stats.json')); print('OK: stats emits valid JSON')" || echo "stats smoke skipped (empty DB)"
          rm -f _smoke_auth.json _smoke_stats.json
      - name: Install desktop deps
        working-directory: src/enterjobs-desktop
        run: npm install
      - name: Decide publish
        id: m
        run: |
          if [ "${{ github.event_name }}" = "push" ] || [ "${{ inputs.publish }}" = "true" ]; then
            echo "flag=--publish always" >> "$GITHUB_OUTPUT"
          else
            echo "flag=--publish never" >> "$GITHUB_OUTPUT"
          fi
      - name: Build Windows (nsis, unsigned)
        if: matrix.os == 'windows-latest'
        working-directory: src/enterjobs-desktop
        env: { GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}" }
        run: npx electron-builder --win ${{ steps.m.outputs.flag }}
      - name: Build Linux (AppImage + deb)
        if: matrix.os == 'ubuntu-latest'
        working-directory: src/enterjobs-desktop
        env: { GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}" }
        run: npx electron-builder --linux ${{ steps.m.outputs.flag }}
      - name: Build macOS (dmg + zip, unsigned)
        if: matrix.os == 'macos-latest'
        working-directory: src/enterjobs-desktop
        env: { GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}", CSC_IDENTITY_AUTO_DISCOVERY: "false" }
        run: npx electron-builder --mac ${{ steps.m.outputs.flag }}
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ej-${{ matrix.os }}
          path: |
            src/enterjobs-desktop/dist/*.exe
            src/enterjobs-desktop/dist/*.AppImage
            src/enterjobs-desktop/dist/*.deb
            src/enterjobs-desktop/dist/*.dmg
            src/enterjobs-desktop/dist/*.zip
            src/enterjobs-desktop/dist/*.yml
