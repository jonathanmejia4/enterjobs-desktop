# EnterJobs desktop — build on the PUBLIC repo's FREE runners. Source lives in the private
# SAF_FileSystem repo (cloned via the SRC_PAT read token); installers publish to THIS repo's
# releases via the built-in GITHUB_TOKEN (same-repo → no extra publish token, no billing quota).
name: Build EnterJobs
on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to this repo's Releases"
        type: boolean
        default: true
  push:
    tags: ["v*"]
permissions:
  contents: write
defaults:
  run:
    shell: bash
jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    steps:
      # Manual clone (not actions/checkout) so we can disable core.protectNTFS — the repo
      # contains a Windows-illegal path (trailing space in Enter_Robotics_Website/...) that
      # aborts a normal Windows checkout even under sparse-checkout (Git validates every tree
      # path before sparse skips it). protectNTFS=false stops that abort; cone sparse-checkout
      # to the 3 build dirs keeps the bad dir out of the working tree (NTFS can't create it).
      - name: Checkout private source (manual; protectNTFS off)
        env:
          SRC_PAT: ${{ secrets.SRC_PAT }}
        run: |
          git -c core.protectNTFS=false clone --no-checkout --depth 1 --filter=blob:none \
            "https://x-access-token:${SRC_PAT}@github.com/jonathanmejia4/SAF_FileSystem.git" src
          cd src
          git sparse-checkout init --cone
          git sparse-checkout set enterjobs-runtime enterjobs-desktop job-search
          git -c core.protectNTFS=false checkout main
          git remote set-url origin https://github.com/jonathanmejia4/SAF_FileSystem.git
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - name: AV-pattern lint gate (fail build on a new antivirus-trigger pattern)
        working-directory: src
        shell: bash
        run: python enterjobs-desktop/scripts/av-lint.py
      - name: Freeze the runtime sidecar (PyInstaller)
        working-directory: src/enterjobs-runtime
        env:
          EJ_REQUIRE_BUNDLED_CLI: "1"   # spec hard-fails if the bundled Claude CLI is missing
          # v0.1.21: Chromium is not yet bundled in the frozen sidecar (a follow-up). The runtime
          # fast-fails cleanly when chromium is absent (no 600s hang), so skip the spec's hard guard
          # here to let the build proceed. Remove this once `patchright install chromium` is bundled.
          EJ_SKIP_BROWSERS_PATH_CHECK: "1"
        run: |
          python -m pip install --upgrade pip pyinstaller
          pip install claude-agent-sdk anyio fastmcp patchright browserforge httpx pyyaml 'litellm[proxy]'
          # v0.1.21: DOCX/PDF export + JD parsing deps so collect_all() actually bundles them (the
          # .spec collects yaml/bs4/docx/pdfplumber/pdfminer/fitz/pymupdf/pypdf/PIL — install them first).
          pip install python-docx beautifulsoup4 pdfplumber pymupdf pdfminer.six pypdf pillow
          # v0.1.43 (device-link): SPAKE2 PAKE pairing + AES-GCM sealing (device_link_crypto.py).
          # spake2 pulls `cryptography` transitively. FATAL — deliberately NO `|| echo` fallback:
          # device-link has no degraded mode (unlike STT's mock), so a silent install miss would
          # ship the feature broken on this OS leg. Let the build fail loudly instead.
          pip install spake2
          # v0.1.42 (V42-STT): real local dictation — the spec collect_all()s faster_whisper/
          # ctranslate2/tokenizers/onnxruntime and SKIPS gracefully if absent (mock fallback), so
          # this install is what makes real STT actually ship. Non-fatal: a wheel failure on one
          # OS leg degrades that leg to the mock engine instead of failing the build.
          pip install faster-whisper || echo "faster-whisper install failed — STT ships as mock on this leg (non-fatal)"
          pip install -r requirements-osint.txt || echo "osint deps partial — non-fatal"
          # Bundle the native Claude Code CLI into claude_agent_sdk/_bundled/ (the agent ENGINE for
          # every model — Claude, or OpenAI/Gemini/local via the LiteLLM proxy). Without it the app
          # crashes on machines with no `claude` on PATH ("spawn claude ENOENT"). Must run AFTER
          # claude-agent-sdk is installed and BEFORE pyinstaller (collect_all ships _bundled/).
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            pwsh -File ./fetch-claude-cli.ps1 -Channel stable
          else
            chmod +x ./fetch-claude-cli.sh && ./fetch-claude-cli.sh stable
          fi
          pyinstaller --noconfirm enterjobs-runtime.spec
          BIN="dist/enterjobs-runtime/enterjobs-runtime"
          [ "${{ matrix.os }}" = "windows-latest" ] && BIN="dist/enterjobs-runtime/enterjobs-runtime.exe"
          # Smoke: the frozen binary must dispatch AND emit valid JSON (catches a binary that
          # launches but has a broken/garbled import tree — pipefail already fails on non-zero exit).
          "$BIN" auth status | tee _smoke_auth.json
          python -c "import json; json.load(open('_smoke_auth.json')); print('OK: auth status emits valid JSON')"
          "$BIN" stats | tee _smoke_stats.json || true
          python -c "import json; json.load(open('_smoke_stats.json')); print('OK: stats emits valid JSON')" || echo "stats smoke skipped (empty DB)"
          # v0.1.43 (device-link): the crypto stack must be importable in the FROZEN binary.
          # `device-link transfer` with no args exits non-zero with its OWN usage error AFTER
          # importing device_link_transfer -> device_link_crypto -> spake2/cryptography; any
          # import error here means the stack was silently dropped from the bundle. FATAL.
          DL_OUT=$("$BIN" device-link transfer 2>&1 || true)
          if echo "$DL_OUT" | grep -qiE "ModuleNotFoundError|ImportError|No module named"; then
            echo "FATAL: device-link stack missing from frozen binary:"; echo "$DL_OUT"; exit 1
          fi
          echo "OK: device-link dispatches without import errors"
          rm -f _smoke_auth.json _smoke_stats.json
      - name: Install desktop deps
        working-directory: src/enterjobs-desktop
        run: npm install
      - name: Decide publish
        id: m
        run: |
          if [ "${{ github.event_name }}" = "push" ] || [ "${{ inputs.publish }}" = "true" ]; then
            echo "flag=--publish always" >> "$GITHUB_OUTPUT"
          else
            echo "flag=--publish never" >> "$GITHUB_OUTPUT"
          fi
      # Windows signing via Azure Trusted/Artifact Signing. Signs automatically once the three
      # AZURE_* service-principal secrets AND the AZURE_CERT_PROFILE var are set on this repo;
      # until then it falls back to an UNSIGNED build so releases keep shipping. Account+endpoint
      # are fixed (Azure resource "enterjobs-signing", East US); publisher MUST match the validated
      # individual identity CN ("Jonathan Mejia"). electron-builder v25 drives Trusted Signing
      # natively from win.azureSignOptions + the AZURE_* env (no extra dlib/dotnet install needed
      # on windows-latest).
      # WB1b: bundle PortableGit (ships bash.exe) so the Claude Code engine has a shell on a clean
      # Windows box. Runs BEFORE the Windows build so win.extraResources {from:"git-win"} can ship it
      # at <resources>/git. (MinGit is git-core only — no bash — so we use PortableGit.) main.js resolves
      # CLAUDE_CODE_GIT_BASH_PATH to <resources>\git\bin\bash.exe when no installed Git is found.
      - name: Bundle PortableGit (bash for the Claude engine) [Windows]
        if: matrix.os == 'windows-latest'
        working-directory: src/enterjobs-desktop
        shell: bash
        env:
          GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        run: |
          set -euo pipefail
          # PortableGit ships bash.exe (MinGit does not). Self-extract, then REPACK as git.zip:
          # electron-builder Azure-signs every loose .exe in extraResources (it choked on git-cmd.exe),
          # but it never signs a .zip. main.js Expand-Archives git.zip on first run.
          url=$(curl -fsSL -H "Authorization: token $GH_TOKEN" https://api.github.com/repos/git-for-windows/git/releases/latest | grep -oE 'https://[^"]+/PortableGit-[0-9.]+-64-bit\.7z\.exe' | head -1)
          echo "PortableGit: $url"
          curl -fsSL -o pgit.7z.exe "$url"
          ./pgit.7z.exe -o pg -y
          test -f pg/bin/bash.exe || { echo "::error::PortableGit extract missing bin/bash.exe"; exit 1; }
          powershell -NoProfile -NonInteractive -Command "Compress-Archive -Path 'pg/*' -DestinationPath 'git.zip' -Force"
          rm -rf pg pgit.7z.exe
          test -f git.zip || { echo "::error::git.zip not produced"; exit 1; }
          echo "git.zip built ($(du -h git.zip | cut -f1))"
      # v0.1.21 W1: ship the bundled Claude CLI as claude.zip (mirrors the git.zip approach above).
      # electron-builder Azure-signs every loose .exe in extraResources and SignTool corrupts
      # claude.exe → the autonomous loop's Python SDK then CLINotFounds (while shell-PATH Q&A still
      # works, which masked it). A .zip is never signed; main.js ensureBundledClaude Expand-Archives
      # it to <userData>\claude\claude.exe on first run. Runs AFTER the freeze, BEFORE the Windows build.
      - name: Bundle Claude CLI as claude.zip [Windows]
        if: matrix.os == 'windows-latest'
        working-directory: src/enterjobs-desktop
        shell: bash
        run: |
          set -euo pipefail
          SRC="../enterjobs-runtime/dist/enterjobs-runtime/_internal/claude_agent_sdk/_bundled/claude.exe"
          test -f "$SRC" || { echo "::error::bundled claude.exe not found at $SRC (freeze step must run first)"; exit 1; }
          # Compress-Archive of a single file puts claude.exe at the zip root → extracts to <userData>\claude\claude.exe.
          powershell -NoProfile -NonInteractive -Command "Compress-Archive -Path '$SRC' -DestinationPath 'claude.zip' -Force"
          test -f claude.zip || { echo "::error::claude.zip not produced"; exit 1; }
          echo "claude.zip built ($(du -h claude.zip | cut -f1))"
      - name: Build Windows (nsis; signed if Azure secrets present)
        if: matrix.os == 'windows-latest'
        working-directory: src/enterjobs-desktop
        env:
          GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          AZURE_TENANT_ID: "${{ secrets.AZURE_TENANT_ID }}"
          AZURE_CLIENT_ID: "${{ secrets.AZURE_CLIENT_ID }}"
          AZURE_CLIENT_SECRET: "${{ secrets.AZURE_CLIENT_SECRET }}"
          AZURE_CERT_PROFILE: "${{ vars.AZURE_CERT_PROFILE }}"
        run: |
          if [ -n "$AZURE_CLIENT_ID" ] && [ -n "$AZURE_CERT_PROFILE" ]; then
            echo "::notice::Signing Windows build via Azure Trusted Signing (publisher: Jonathan Mejia, profile: $AZURE_CERT_PROFILE)"
            npx electron-builder --win ${{ steps.m.outputs.flag }} \
              -c.win.azureSignOptions.endpoint="https://eus.codesigning.azure.net/" \
              -c.win.azureSignOptions.codeSigningAccountName="enterjobs-signing" \
              -c.win.azureSignOptions.certificateProfileName="$AZURE_CERT_PROFILE" \
              -c.win.azureSignOptions.TimestampRfc3161="http://timestamp.acs.microsoft.com" \
              -c.win.azureSignOptions.TimestampDigest="SHA256"
          else
            echo "::warning::Azure signing secrets not set — building Windows UNSIGNED"
            npx electron-builder --win ${{ steps.m.outputs.flag }}
          fi
      # ── GATE: Windows ── (v0.1.51 MODULE_NOT_FOUND incident: lib/** not in build.files)
      # Required gate — no continue-on-error. Runs AFTER packaging, BEFORE artifact upload.
      - name: ASAR gate [Windows]
        if: matrix.os == 'windows-latest'
        working-directory: src/enterjobs-desktop
        shell: bash
        run: |
          ASAR="dist/win-unpacked/resources/app.asar"
          test -f "$ASAR" || { echo "::error::app.asar not found at $ASAR — check electron-builder output"; exit 1; }
          node scripts/ci_asar_gate.js "$ASAR"
      - name: Boot smoke [Windows]
        if: matrix.os == 'windows-latest'
        working-directory: src/enterjobs-desktop
        shell: pwsh
        run: |
          $binary = "dist\win-unpacked\EnterJobs.exe"
          if (-not (Test-Path $binary)) {
            Write-Error "Boot-smoke binary not found: $binary"
            exit 1
          }
          $env:EJ_BOOT_SMOKE = "1"
          $proc = Start-Process -FilePath $binary -ArgumentList "--no-sandbox" `
            -PassThru -Wait `
            -RedirectStandardOutput "$env:RUNNER_TEMP\ej_smoke_out.txt" `
            -RedirectStandardError "$env:RUNNER_TEMP\ej_smoke_err.txt"
          $stdout = if (Test-Path "$env:RUNNER_TEMP\ej_smoke_out.txt") { Get-Content "$env:RUNNER_TEMP\ej_smoke_out.txt" -Raw } else { "" }
          $stderr = if (Test-Path "$env:RUNNER_TEMP\ej_smoke_err.txt") { Get-Content "$env:RUNNER_TEMP\ej_smoke_err.txt" -Raw } else { "" }
          Write-Host "=== boot-smoke stdout ===" ; Write-Host $stdout
          Write-Host "=== boot-smoke stderr ===" ; Write-Host $stderr
          if ($proc.ExitCode -ne 0) {
            Write-Error "Boot smoke FAILED: exit $($proc.ExitCode)"
            exit 1
          }
          if (-not ($stdout -match "EJ_BOOT_SMOKE_OK")) {
            Write-Error "Boot smoke FAILED: EJ_BOOT_SMOKE_OK not found in stdout"
            exit 1
          }
          Write-Host "::notice::Boot smoke PASS [Windows]"
      - name: Build Linux (AppImage + deb)
        if: matrix.os == 'ubuntu-latest'
        working-directory: src/enterjobs-desktop
        env: { GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}" }
        run: npx electron-builder --linux ${{ steps.m.outputs.flag }}
      # ── GATE: Linux ── (v0.1.51 MODULE_NOT_FOUND incident: lib/** not in build.files)
      # Required gate — no continue-on-error. Runs AFTER packaging, BEFORE artifact upload.
      - name: ASAR gate [Linux]
        if: matrix.os == 'ubuntu-latest'
        working-directory: src/enterjobs-desktop
        run: |
          ASAR="dist/linux-unpacked/resources/app.asar"
          test -f "$ASAR" || { echo "::error::app.asar not found at $ASAR — check electron-builder output"; exit 1; }
          node scripts/ci_asar_gate.js "$ASAR"
      - name: Boot smoke [Linux]
        if: matrix.os == 'ubuntu-latest'
        working-directory: src/enterjobs-desktop
        run: |
          # productName=EnterJobs -> linux binary lowercased = enterjobs
          BINARY="dist/linux-unpacked/enterjobs"
          test -f "$BINARY" || { echo "::error::boot-smoke binary not found: $BINARY"; exit 1; }
          chmod +x "$BINARY"
          CODE=0
          OUT=$(EJ_BOOT_SMOKE=1 timeout 90 xvfb-run -a "$BINARY" --no-sandbox 2>&1) || CODE=$?
          echo "=== boot-smoke output ===" ; echo "$OUT"
          if [ "$CODE" -ne 0 ]; then
            echo "::error::Boot smoke FAILED: exit $CODE"
            exit 1
          fi
          if ! echo "$OUT" | grep -q "EJ_BOOT_SMOKE_OK"; then
            echo "::error::Boot smoke FAILED: EJ_BOOT_SMOKE_OK not found in output"
            exit 1
          fi
          echo "::notice::Boot smoke PASS [Linux]"
      # macOS signing via Apple Developer ID + notarization. Signs automatically once CSC_LINK
      # (base64 of the Developer ID Application .p12) + CSC_KEY_PASSWORD are set. Notarization
      # (electron-builder v25, hardenedRuntime already on) uses EITHER an App Store Connect API
      # key (APPLE_API_KEY_B64 -> materialized to a .p8 + APPLE_API_KEY_ID/APPLE_API_ISSUER)
      # OR an Apple ID + app-specific password (APPLE_ID/APPLE_APP_SPECIFIC_PASSWORD/APPLE_TEAM_ID).
      # Until those secrets exist it builds UNSIGNED — identical to before, never breaks the pipeline.
      - name: Build macOS (dmg + zip; signed+notarized if Apple secrets present)
        if: matrix.os == 'macos-latest'
        working-directory: src/enterjobs-desktop
        env:
          GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          CSC_LINK: "${{ secrets.CSC_LINK }}"
          CSC_KEY_PASSWORD: "${{ secrets.CSC_KEY_PASSWORD }}"
          APPLE_API_KEY_B64: "${{ secrets.APPLE_API_KEY_B64 }}"
          APPLE_API_KEY_ID: "${{ secrets.APPLE_API_KEY_ID }}"
          APPLE_API_ISSUER: "${{ secrets.APPLE_API_ISSUER }}"
          APPLE_ID: "${{ secrets.APPLE_ID }}"
          APPLE_APP_SPECIFIC_PASSWORD: "${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}"
          APPLE_TEAM_ID: "${{ secrets.APPLE_TEAM_ID }}"
        run: |
          if [ -n "$CSC_LINK" ]; then
            # Notarization ENABLED — Apple first-submission warm-up cleared (notarytool history: Accepted 2026-06-23).
            # ID's FIRST notarization (stuck "In Progress" for hours — a one-time account warm-up).
            # Signing still happens (no Gatekeeper "unidentified developer"; users get a one-time
            # right-click→Open). Re-enable by removing `-c.mac.notarize=false` once a submission
            # clears (xcrun notarytool history → Accepted). The APPLE_* env is kept ready for then.
            echo "::notice::Signing + notarizing macOS build with Developer ID"
            if [ -n "$APPLE_API_KEY_B64" ]; then
              echo "$APPLE_API_KEY_B64" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"
              export APPLE_API_KEY="$RUNNER_TEMP/AuthKey.p8"
            fi
            npx electron-builder --mac ${{ steps.m.outputs.flag }}
          else
            echo "::warning::Apple signing secrets not set — building macOS UNSIGNED"
            CSC_IDENTITY_AUTO_DISCOVERY=false npx electron-builder --mac ${{ steps.m.outputs.flag }}
          fi
      # ── GATE: macOS ── (v0.1.51 MODULE_NOT_FOUND incident: lib/** not in build.files)
      # Required gate — no continue-on-error. Runs AFTER packaging, BEFORE artifact upload.
      # electron-builder produces dist/mac/ (x64) and/or dist/mac-arm64/ (arm64) depending on arch.
      # The gate checks all present arch dirs; at least one must exist.
      - name: ASAR gate [macOS]
        if: matrix.os == 'macos-latest'
        working-directory: src/enterjobs-desktop
        run: |
          checked=0
          for app_dir in dist/mac dist/mac-arm64 dist/mac-universal; do
            ASAR="$app_dir/EnterJobs.app/Contents/Resources/app.asar"
            if [ -f "$ASAR" ]; then
              echo "Checking: $ASAR"
              node scripts/ci_asar_gate.js "$ASAR"
              checked=$((checked+1))
            fi
          done
          if [ "$checked" -eq 0 ]; then
            echo "::error::No app.asar found under dist/mac*/EnterJobs.app/Contents/Resources/ — check electron-builder output"
            exit 1
          fi
          echo "::notice::ASAR gate PASS [macOS] — checked $checked arch(es)"
      - name: Boot smoke [macOS]
        if: matrix.os == 'macos-latest'
        working-directory: src/enterjobs-desktop
        run: |
          # Find the first available arch binary (x64 first, then arm64)
          BINARY=""
          for app_dir in dist/mac dist/mac-arm64; do
            CANDIDATE="$app_dir/EnterJobs.app/Contents/MacOS/EnterJobs"
            if [ -f "$CANDIDATE" ]; then
              BINARY="$CANDIDATE"
              break
            fi
          done
          if [ -z "$BINARY" ]; then
            echo "::error::boot-smoke binary not found in dist/mac*/EnterJobs.app/Contents/MacOS/EnterJobs"
            exit 1
          fi
          chmod +x "$BINARY"
          CODE=0
          OUT=$(EJ_BOOT_SMOKE=1 timeout 90 "$BINARY" --no-sandbox 2>&1) || CODE=$?
          echo "=== boot-smoke output ===" ; echo "$OUT"
          if [ "$CODE" -ne 0 ]; then
            echo "::error::Boot smoke FAILED: exit $CODE"
            exit 1
          fi
          if ! echo "$OUT" | grep -q "EJ_BOOT_SMOKE_OK"; then
            echo "::error::Boot smoke FAILED: EJ_BOOT_SMOKE_OK not found in output"
            exit 1
          fi
          echo "::notice::Boot smoke PASS [macOS]"
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ej-${{ matrix.os }}
          path: |
            src/enterjobs-desktop/dist/*.exe
            src/enterjobs-desktop/dist/*.AppImage
            src/enterjobs-desktop/dist/*.deb
            src/enterjobs-desktop/dist/*.dmg
            src/enterjobs-desktop/dist/*.zip
            src/enterjobs-desktop/dist/*.yml

  # FB3 (FMEA #1, BLOCKER): atomic-release gate. Runs even if an OS leg failed (if: always()),
  # so a PARTIAL publish (e.g. the v0.1.15 Windows failure that left "latest" without a .exe) FAILS
  # the run loudly instead of silently advertising a version with a missing installer/feed.
  verify-release:
    name: verify-release (atomic publish gate)
    needs: build
    if: ${{ always() && (github.event_name == 'push' || inputs.publish) }}
    runs-on: ubuntu-latest
    steps:
      - name: All 3 OS installers + update feeds must be present & version-consistent
        run: |
          set -uo pipefail
          BASE="https://github.com/${{ github.repository }}/releases/latest/download"
          INSTALLERS="EnterJobs-Setup.exe EnterJobs-arm64.dmg EnterJobs-x86_64.AppImage"
          FEEDS="latest.yml latest-mac.yml latest-linux.yml"
          for tries in 1 2 3 4 5 6; do
            ok=1; vers=""
            for f in $INSTALLERS; do
              code=$(curl -s -o /dev/null -w "%{http_code}" -IL "$BASE/$f")
              [ "$code" = "200" ] || { echo "::warning::installer missing: $f (HTTP $code)"; ok=0; }
            done
            for y in $FEEDS; do
              body=$(curl -fsSL "$BASE/$y" 2>/dev/null) || { echo "::warning::feed missing: $y"; ok=0; continue; }
              v=$(printf '%s\n' "$body" | sed -n 's/^version: *//p' | head -1)
              [ -n "$v" ] && vers="$vers $v"
            done
            uniq=$(printf '%s\n' $vers | tr ' ' '\n' | sed '/^$/d' | sort -u | wc -l | tr -d ' ')
            if [ "$ok" = "1" ] && [ "$uniq" = "1" ]; then
              echo "::notice::atomic release OK — all 3 installers + 3 feeds present at $(printf '%s' $vers | awk '{print $1}')"
              exit 0
            fi
            echo "attempt $tries/6: incomplete (ok=$ok distinct_versions=$uniq) — waiting for propagation"; sleep 20
          done
          echo "::error::PARTIAL/INCONSISTENT RELEASE — not all 3 installers + feeds resolved at one version. Do NOT announce 'latest' until fixed."
          exit 1
