# EnterJobs desktop — build on the PUBLIC repo's FREE runners. Source lives in the private
# SAF_FileSystem repo (cloned via the SRC_PAT read token); installers publish to THIS repo's
# releases via the built-in GITHUB_TOKEN (same-repo → no extra publish token, no billing quota).
name: Build EnterJobs
on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to this repo's Releases"
        type: boolean
        default: true
  push:
    tags: ["v*"]
permissions:
  contents: write
defaults:
  run:
    shell: bash
jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    steps:
      # Manual clone (not actions/checkout) so we can disable core.protectNTFS — the repo
      # contains a Windows-illegal path (trailing space in Enter_Robotics_Website/...) that
      # aborts a normal Windows checkout even under sparse-checkout (Git validates every tree
      # path before sparse skips it). protectNTFS=false stops that abort; cone sparse-checkout
      # to the 3 build dirs keeps the bad dir out of the working tree (NTFS can't create it).
      - name: Checkout private source (manual; protectNTFS off)
        env:
          SRC_PAT: ${{ secrets.SRC_PAT }}
        run: |
          git -c core.protectNTFS=false clone --no-checkout --depth 1 --filter=blob:none \
            "https://x-access-token:${SRC_PAT}@github.com/jonathanmejia4/SAF_FileSystem.git" src
          cd src
          git sparse-checkout init --cone
          git sparse-checkout set enterjobs-runtime enterjobs-desktop job-search
          git -c core.protectNTFS=false checkout main
          git remote set-url origin https://github.com/jonathanmejia4/SAF_FileSystem.git
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - name: Freeze the runtime sidecar (PyInstaller)
        working-directory: src/enterjobs-runtime
        env:
          EJ_REQUIRE_BUNDLED_CLI: "1"   # spec hard-fails if the bundled Claude CLI is missing
        run: |
          python -m pip install --upgrade pip pyinstaller
          pip install claude-agent-sdk anyio fastmcp patchright browserforge httpx pyyaml 'litellm[proxy]'
          pip install -r requirements-osint.txt || echo "osint deps partial — non-fatal"
          # Bundle the native Claude Code CLI into claude_agent_sdk/_bundled/ (the agent ENGINE for
          # every model — Claude, or OpenAI/Gemini/local via the LiteLLM proxy). Without it the app
          # crashes on machines with no `claude` on PATH ("spawn claude ENOENT"). Must run AFTER
          # claude-agent-sdk is installed and BEFORE pyinstaller (collect_all ships _bundled/).
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            pwsh -File ./fetch-claude-cli.ps1 -Channel stable
          else
            chmod +x ./fetch-claude-cli.sh && ./fetch-claude-cli.sh stable
          fi
          pyinstaller --noconfirm enterjobs-runtime.spec
          BIN="dist/enterjobs-runtime/enterjobs-runtime"
          [ "${{ matrix.os }}" = "windows-latest" ] && BIN="dist/enterjobs-runtime/enterjobs-runtime.exe"
          # Smoke: the frozen binary must dispatch AND emit valid JSON (catches a binary that
          # launches but has a broken/garbled import tree — pipefail already fails on non-zero exit).
          "$BIN" auth status | tee _smoke_auth.json
          python -c "import json; json.load(open('_smoke_auth.json')); print('OK: auth status emits valid JSON')"
          "$BIN" stats | tee _smoke_stats.json || true
          python -c "import json; json.load(open('_smoke_stats.json')); print('OK: stats emits valid JSON')" || echo "stats smoke skipped (empty DB)"
          rm -f _smoke_auth.json _smoke_stats.json
      - name: Install desktop deps
        working-directory: src/enterjobs-desktop
        run: npm install
      - name: Decide publish
        id: m
        run: |
          if [ "${{ github.event_name }}" = "push" ] || [ "${{ inputs.publish }}" = "true" ]; then
            echo "flag=--publish always" >> "$GITHUB_OUTPUT"
          else
            echo "flag=--publish never" >> "$GITHUB_OUTPUT"
          fi
      # Windows signing via Azure Trusted/Artifact Signing. Signs automatically once the three
      # AZURE_* service-principal secrets AND the AZURE_CERT_PROFILE var are set on this repo;
      # until then it falls back to an UNSIGNED build so releases keep shipping. Account+endpoint
      # are fixed (Azure resource "enterjobs-signing", East US); publisher MUST match the validated
      # individual identity CN ("Jonathan Mejia"). electron-builder v25 drives Trusted Signing
      # natively from win.azureSignOptions + the AZURE_* env (no extra dlib/dotnet install needed
      # on windows-latest).
      - name: Build Windows (nsis; signed if Azure secrets present)
        if: matrix.os == 'windows-latest'
        working-directory: src/enterjobs-desktop
        env:
          GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          AZURE_TENANT_ID: "${{ secrets.AZURE_TENANT_ID }}"
          AZURE_CLIENT_ID: "${{ secrets.AZURE_CLIENT_ID }}"
          AZURE_CLIENT_SECRET: "${{ secrets.AZURE_CLIENT_SECRET }}"
          AZURE_CERT_PROFILE: "${{ vars.AZURE_CERT_PROFILE }}"
        run: |
          if [ -n "$AZURE_CLIENT_ID" ] && [ -n "$AZURE_CERT_PROFILE" ]; then
            echo "::notice::Signing Windows build via Azure Trusted Signing (publisher: Jonathan Mejia, profile: $AZURE_CERT_PROFILE)"
            npx electron-builder --win ${{ steps.m.outputs.flag }} \
              -c.win.azureSignOptions.endpoint="https://eus.codesigning.azure.net/" \
              -c.win.azureSignOptions.codeSigningAccountName="enterjobs-signing" \
              -c.win.azureSignOptions.certificateProfileName="$AZURE_CERT_PROFILE"
          else
            echo "::warning::Azure signing secrets not set — building Windows UNSIGNED"
            npx electron-builder --win ${{ steps.m.outputs.flag }}
          fi
      - name: Build Linux (AppImage + deb)
        if: matrix.os == 'ubuntu-latest'
        working-directory: src/enterjobs-desktop
        env: { GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}" }
        run: npx electron-builder --linux ${{ steps.m.outputs.flag }}
      # macOS signing via Apple Developer ID + notarization. Signs automatically once CSC_LINK
      # (base64 of the Developer ID Application .p12) + CSC_KEY_PASSWORD are set. Notarization
      # (electron-builder v25, hardenedRuntime already on) uses EITHER an App Store Connect API
      # key (APPLE_API_KEY_B64 -> materialized to a .p8 + APPLE_API_KEY_ID/APPLE_API_ISSUER)
      # OR an Apple ID + app-specific password (APPLE_ID/APPLE_APP_SPECIFIC_PASSWORD/APPLE_TEAM_ID).
      # Until those secrets exist it builds UNSIGNED — identical to before, never breaks the pipeline.
      - name: Build macOS (dmg + zip; signed+notarized if Apple secrets present)
        if: matrix.os == 'macos-latest'
        working-directory: src/enterjobs-desktop
        env:
          GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          CSC_LINK: "${{ secrets.CSC_LINK }}"
          CSC_KEY_PASSWORD: "${{ secrets.CSC_KEY_PASSWORD }}"
          APPLE_API_KEY_B64: "${{ secrets.APPLE_API_KEY_B64 }}"
          APPLE_API_KEY_ID: "${{ secrets.APPLE_API_KEY_ID }}"
          APPLE_API_ISSUER: "${{ secrets.APPLE_API_ISSUER }}"
          APPLE_ID: "${{ secrets.APPLE_ID }}"
          APPLE_APP_SPECIFIC_PASSWORD: "${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}"
          APPLE_TEAM_ID: "${{ secrets.APPLE_TEAM_ID }}"
        run: |
          if [ -n "$CSC_LINK" ]; then
            # TEMPORARY sign-only: notarize is OFF while Apple processes this brand-new Developer
            # ID's FIRST notarization (stuck "In Progress" for hours — a one-time account warm-up).
            # Signing still happens (no Gatekeeper "unidentified developer"; users get a one-time
            # right-click→Open). Re-enable by removing `-c.mac.notarize=false` once a submission
            # clears (xcrun notarytool history → Accepted). The APPLE_* env is kept ready for then.
            echo "::notice::Signing macOS build with Developer ID (notarize OFF — Apple first-submission warm-up)"
            if [ -n "$APPLE_API_KEY_B64" ]; then
              echo "$APPLE_API_KEY_B64" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"
              export APPLE_API_KEY="$RUNNER_TEMP/AuthKey.p8"
            fi
            npx electron-builder --mac ${{ steps.m.outputs.flag }} -c.mac.notarize=false
          else
            echo "::warning::Apple signing secrets not set — building macOS UNSIGNED"
            CSC_IDENTITY_AUTO_DISCOVERY=false npx electron-builder --mac ${{ steps.m.outputs.flag }}
          fi
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ej-${{ matrix.os }}
          path: |
            src/enterjobs-desktop/dist/*.exe
            src/enterjobs-desktop/dist/*.AppImage
            src/enterjobs-desktop/dist/*.deb
            src/enterjobs-desktop/dist/*.dmg
            src/enterjobs-desktop/dist/*.zip
            src/enterjobs-desktop/dist/*.yml
